name: Verify

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Compile sources
        run: uv run python -m compileall main.py modules win

      - name: Import core modules
        run: uv run python -c "import modules.utils, modules.userLogin, modules.AutoCourseGrabbing; print('imports ok')"
